project:
  type: website
  pre-render: python quarto_utils.py pre
  post-render: python quarto_utils.py post
  output-dir: _site
  title: "STIsim"
  execute-dir: file
  resources:
    - objects.json
    - objects.inv

website:
  title: "STIsim"
  image: /assets/starsim-logo.png
  favicon: /assets/favicon.ico
  google-analytics: "GTM-NK4K647"

  repo-url: https://github.com/starsimhub/stisim
  repo-actions: [issue]
  page-navigation: true
  search:
    type: overlay

  page-footer:
    center: "Docs built for STIsim v{{< var version >}} ({{< var versiondate >}}).<br>© 2024–2026, Gates Foundation. All rights reserved. [Privacy and Cookies Notice](https://www.gatesfoundation.org/Privacy-and-Cookies-Notice) | [Terms of Use](https://www.gatesfoundation.org/Terms-of-Use)"
    right:
      - icon: github
        href: https://github.com/starsimhub/stisim
        aria-label: GitHub
      - icon: envelope-at-fill
        href: mailto:info@starsim.org
      - icon: slack
        href: https://starsim-idm.slack.com
      - icon: globe
        href: https://starsim.org/

  navbar:
    logo: /assets/starsim-logo.png
    title: false
    collapse-below: lg

    tools:
      - icon: github
        href: https://github.com/starsimhub/stisim
      - icon: envelope-at-fill
        href: mailto:info@starsim.org
      - icon: slack
        href: https://starsim-idm.slack.com
      - icon: globe
        href: https://starsim.org

    left:
      - href: index.md
        text: Home
      - href: whatsnew.md
        text: What's new
      - href: tutorials/index.md
        text: Tutorials
      - href: user_guide/index.md
        text: User guide
      - href: examples/index.qmd
        text: Examples
      - href: code_of_conduct.md
        text: Code of conduct
      - href: contributing.md
        text: Contributing
      - href: api/index.qmd
        text: API reference

  sidebar:
    - id: main
      collapse-level: 3
      contents:
        - href: index.md
          text: "**Home**"
        - href: whatsnew.md
          text: "**What's new**"
        - href: api/index.qmd
          text: "**API reference**"
        - section: "**Tutorials**"
          contents:
            - href: tutorials/index.md
              text: "Overview"
            - tutorials/tut_intro.qmd
            - tutorials/tut_cotransmission.qmd
            - tutorials/tut_results.qmd
            - tutorials/tut_interventions.qmd
            - tutorials/tut_calibration.qmd
        - section: "**User guide**"
          contents:
            - href: user_guide/index.md
              text: "Overview"
            - href: user_guide/hivsim.md
              text: "HIVsim"
            - section: "Diseases"
              contents:
                - href: user_guide/diseases/index.md
                  text: "Overview"
                - user_guide/diseases/hiv.md
                - user_guide/diseases/syphilis.md
                - user_guide/diseases/chlamydia.md
                - user_guide/diseases/gonorrhea.md
                - user_guide/diseases/trichomoniasis.md
                - user_guide/diseases/bv.md
                - user_guide/diseases/gud.md
            - section: "Networks"
              contents:
                - user_guide/networks/structured_sexual.md
                - user_guide/networks/msm.md
            - section: "Interventions"
              contents:
                - user_guide/interventions/interventions.md
            - user_guide/connectors.md
            - user_guide/calibration.md
        - section: "**Examples**"
          contents:
            - href: examples/index.qmd
              text: "Overview"
            - examples/art_interruptions.qmd
            - examples/dynamic_debut.qmd
        - href: code_of_conduct.md
          text: "**Code of conduct**"
        - href: contributing.md
          text: "**Contributing**"
    - id: api
      collapse-level: 2
      contents:
        - href: index.md
          text: "**Home**"
        - href: api/index.qmd
          text: "**API reference**"
        - section: "**Core**"
          contents:
            - api/sim.qmd
            - api/parameters.qmd
            - api/networks.qmd
            - api/demographics.qmd
            - api/analyzers.qmd
            - api/calibration.qmd
            - api/care_seeking.qmd
            - api/utils.qmd
        - section: "**Diseases**"
          contents:
            - text: sti
              href: api/diseases.sti.qmd
            - text: hiv
              href: api/diseases.hiv.qmd
            - text: syphilis
              href: api/diseases.syphilis.qmd
            - text: chlamydia
              href: api/diseases.chlamydia.qmd
            - text: gonorrhea
              href: api/diseases.gonorrhea.qmd
            - text: trichomoniasis
              href: api/diseases.trichomoniasis.qmd
            - text: bv
              href: api/diseases.bv.qmd
            - text: gud
              href: api/diseases.gud.qmd
        - section: "**Interventions**"
          contents:
            - text: base_interventions
              href: api/interventions.base_interventions.qmd
            - text: bv_interventions
              href: api/interventions.bv_interventions.qmd
            - text: gonorrhea_interventions
              href: api/interventions.gonorrhea_interventions.qmd
            - text: hiv_interventions
              href: api/interventions.hiv_interventions.qmd
            - text: syphilis_interventions
              href: api/interventions.syphilis_interventions.qmd
        - section: "**Connectors**"
          contents:
            - api/connectors.hiv_sti.qmd
            - api/connectors.gud_syph.qmd
        - section: "**HIVsim**"
          contents:
            - api/hivsim/sim.qmd

quartodoc:
  package: stisim
  title: API reference
  style: pkgdown
  dir: api
  parser: google
  render_interlinks: true
  sections:
    - title: Core
      desc: Core simulation classes and utilities.
      contents:
        - sim
        - parameters
        - networks
        - demographics
        - analyzers
        - calibration
        - care_seeking
        - utils
    - title: Diseases
      desc: STI disease modules.
      contents:
        - diseases.sti
        - diseases.hiv
        - diseases.syphilis
        - diseases.chlamydia
        - diseases.gonorrhea
        - diseases.trichomoniasis
        - diseases.bv
        - diseases.gud
    - title: Interventions
      desc: Testing, treatment, and prevention.
      contents:
        - interventions.base_interventions
        - interventions.bv_interventions
        - interventions.gonorrhea_interventions
        - interventions.hiv_interventions
        - interventions.syphilis_interventions
    - title: Connectors
      desc: Coinfection interactions.
      contents:
        - connectors.hiv_sti
        - connectors.gud_syph

format:
  html:
    theme:
      light: [cosmo, ./assets/styles-light.scss]
      dark: [cosmo, ./assets/styles-dark.scss]
    css: ./assets/styles.css
    toc: true
    toc-expand: true
    toc-depth: 5
    highlight-style: github

filters:
  - interlinks

interlinks:
  fast: false
  sources:
    python:
      url: https://docs.python.org/3/
    numpy:
      url: https://numpy.org/doc/stable/
    pandas:
      url: https://pandas.pydata.org/pandas-docs/stable/
    scipy:
      url: https://docs.scipy.org/doc/scipy/
    matplotlib:
      url: https://matplotlib.org/stable/
    sciris:
      url: https://docs.sciris.org/en/latest/
    starsim:
      url: https://docs.starsim.org/
  autolink: true
  aliases:
    numpy: [np]
    pandas: [pd]
    matplotlib: [plt]
    sciris: [sc]
    starsim: [ss]
    stisim: [sti]

execute:
  freeze: auto
  cache: true
  error: false
  echo: true
  warning: true
